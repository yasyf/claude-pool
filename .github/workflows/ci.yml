name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (default, pure Go)
        run: go build ./...

      - name: Build amd64 (cross, pure Go)
        run: CGO_ENABLED=0 GOARCH=amd64 go build -o /tmp/clp-amd64 ./cmd/cc-pool

      - name: Vet + compile fuse variant (cgo + fuse-t headers)
        # fuse-t is not present on CI runners; install headers/lib so the cgo
        # fuse build compiles. The live mount test is skipped (needs the
        # interactive "Network Volumes" grant) — compilation is the canary.
        run: |
          brew install macos-fuse-t/cask/fuse-t || echo "fuse-t tap unavailable; skipping fuse build"
          if [ -f /usr/local/lib/libfuse-t.dylib ]; then
            CGO_ENABLED=1 go vet -tags fuse ./...
            CGO_ENABLED=1 go build -tags fuse ./...
          else
            echo "fuse-t not installed on runner; skipping fuse compile"
          fi

  smoke:
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Build + version smoke
        run: |
          go build -ldflags "-X github.com/yasyf/cc-pool/internal/version.Version=ci" -o /tmp/cc-pool ./cmd/cc-pool
          /tmp/cc-pool --version | grep -q ci
          /tmp/cc-pool --help | grep -q "emptiest account"
          /tmp/cc-pool list || true   # exits cleanly with "no accounts" before init
