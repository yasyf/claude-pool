name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build universal binary (pure Go, arm64 + amd64 via lipo)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/claude-pool/internal/version.Version=${VERSION} -X github.com/yasyf/claude-pool/internal/version.Commit=${COMMIT}"
          mkdir -p dist
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/claude-pool-arm64 ./cmd/claude-pool
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/claude-pool-amd64 ./cmd/claude-pool
          lipo -create -output dist/claude-pool dist/claude-pool-arm64 dist/claude-pool-amd64
          cd dist
          tar -czf claude-pool-${VERSION}-darwin-universal.tar.gz claude-pool
          tar -czf claude-pool-${VERSION}-darwin-arm64.tar.gz -s '/claude-pool-arm64/claude-pool/' claude-pool-arm64 2>/dev/null || \
            { cp claude-pool-arm64 claude-pool && tar -czf claude-pool-${VERSION}-darwin-arm64.tar.gz claude-pool && rm claude-pool; }
          shasum -a 256 *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true

  bump-formula:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Formula to tagged source tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          # The tag tarball is immutable; its sha256 is stable.
          curl -fsSL "$TARBALL_URL" -o /tmp/src.tar.gz
          SHA="$(shasum -a 256 /tmp/src.tar.gz | awk '{print $1}')"
          F=Formula/claude-pool.rb
          sed -i -E "s|url \".*\"|url \"${TARBALL_URL}\"|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${SHA}\"|" "$F"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$F"
          git commit -m "Formula: bump to ${GITHUB_REF_NAME} (${SHA})" || echo "no formula change"
          git push origin main
