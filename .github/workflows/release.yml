name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify-on-main:
    # Only commits that live on main may be released. A vX.Y.Z tag is built and
    # published from its own commit, so if that commit isn't reachable from main
    # (e.g. a `git push` of main lost a race and the tag went out anyway, or the
    # tag was cut from a side branch) the release would not reflect main's
    # history. Fail fast — before any macOS runner spins up — and make the rest
    # of the pipeline depend on this.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so merge-base can reach the common ancestor
      - name: Require the tagged commit to be on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is not on main — only commits on main can be released. Push the commit to main first, then re-tag."
            exit 1
          fi
          echo "ok: ${GITHUB_SHA} is contained in main"

  build:
    runs-on: macos-15
    needs: verify-on-main
    outputs:
      pure_sha256: ${{ steps.shas.outputs.pure }}
      fuse_sha256: ${{ steps.shas.outputs.fuse }}
      app_sha256: ${{ steps.shas.outputs.app }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install fuse-t (build-time headers for the -tags fuse variant)
        run: brew install macos-fuse-t/cask/fuse-t

      - name: Build universal binaries (pure Go + fuse, arm64 + amd64 via lipo)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-pool/internal/version.Version=${VERSION} -X github.com/yasyf/cc-pool/internal/version.Commit=${COMMIT}"
          mkdir -p dist/pure dist/fuse dist/arm64

          # Pure Go (symlink overlay; the default install).
          CGO_ENABLED=0 GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/pure-arm64 ./cmd/cc-pool
          CGO_ENABLED=0 GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/pure-amd64 ./cmd/cc-pool
          lipo -create -output dist/pure/cc-pool dist/pure-arm64 dist/pure-amd64

          # Fuse variant (live-mirror overlay): cgo, dlopens libfuse-t at
          # runtime. The amd64 slice cross-compiles — the macOS SDK is fat.
          export CGO_CFLAGS="-mmacosx-version-min=12.0" CGO_LDFLAGS="-mmacosx-version-min=12.0"
          CGO_ENABLED=1 GOARCH=arm64 go build -tags fuse -ldflags "$LDFLAGS" -o dist/fuse-arm64 ./cmd/cc-pool
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" go build -tags fuse -ldflags "$LDFLAGS" -o dist/fuse-amd64 ./cmd/cc-pool
          lipo -create -output dist/fuse/cc-pool dist/fuse-arm64 dist/fuse-amd64

          # Re-apply ad-hoc signatures post-lipo (mandatory on arm64), then
          # smoke-test that the native slices load and report the right version.
          codesign --force -s - dist/pure/cc-pool dist/fuse/cc-pool
          dist/pure/cc-pool --version | grep -q "${VERSION}"
          dist/fuse/cc-pool --version | grep -q "${VERSION}"

          # Every tarball contains a binary named exactly `cc-pool`.
          cp dist/pure-arm64 dist/arm64/cc-pool
          tar -czf "dist/cc-pool-${VERSION}-darwin-universal.tar.gz" -C dist/pure cc-pool
          tar -czf "dist/cc-pool-${VERSION}-darwin-universal-fuse.tar.gz" -C dist/fuse cc-pool
          tar -czf "dist/cc-pool-${VERSION}-darwin-arm64.tar.gz" -C dist/arm64 cc-pool

      - name: Build the Notification Center widget app (cc-pool-status cask payload)
        run: |
          brew install xcodegen
          cd widget
          xcodegen generate
          xcodebuild -project CCPoolStatus.xcodeproj -scheme CCPoolStatus \
            -configuration Release -derivedDataPath build build
          APP=build/Build/Products/Release/CCPoolStatus.app
          # The appex must carry the sandbox + ~/.cc-pool read exception, or the
          # widget silently can't read status.json — fail the release instead.
          codesign --verify --strict "$APP"
          codesign -d --entitlements - "$APP/Contents/PlugIns/CCPoolStatusWidget.appex" 2>&1 |
            grep -q "temporary-exception.files.home-relative-path.read-only"
          # ditto -c -k preserves the bundle metadata a plain zip would drop.
          ditto -c -k --keepParent "$APP" "../dist/cc-pool-status-${GITHUB_REF_NAME}-darwin.zip"

      - name: Checksum the release assets
        run: |
          cd dist
          shasum -a 256 -- *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Export checksums for the formula and cask bumps
        id: shas
        run: |
          cd dist
          PURE="$(grep -E 'darwin-universal\.tar\.gz$' SHA256SUMS.txt | awk '{print $1}')"
          FUSE="$(grep -E 'darwin-universal-fuse\.tar\.gz$' SHA256SUMS.txt | awk '{print $1}')"
          APP="$(grep -E 'cc-pool-status-.*-darwin\.zip$' SHA256SUMS.txt | awk '{print $1}')"
          test -n "$PURE" && test -n "$FUSE" && test -n "$APP"
          echo "pure=${PURE}" >> "$GITHUB_OUTPUT"
          echo "fuse=${FUSE}" >> "$GITHUB_OUTPUT"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: tarballs
          path: dist/*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  smoke-no-fuse:
    # The fuse binary dlopens libfuse-t.dylib lazily and must run cleanly on a
    # Mac WITHOUT fuse-t. A fresh runner has none — prove it before release.
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: tarballs

      - name: Run the fuse binary without fuse-t installed
        run: |
          test ! -f /usr/local/lib/libfuse-t.dylib
          tar -xzf "cc-pool-${GITHUB_REF_NAME}-darwin-universal-fuse.tar.gz"
          ./cc-pool --version
          ./cc-pool --help | grep -q "emptiest account"

  bump-formula:
    runs-on: ubuntu-latest
    needs: [build, smoke-no-fuse]
    # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Formula and Cask to the release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PURE_SHA="${{ needs.build.outputs.pure_sha256 }}"
          FUSE_SHA="${{ needs.build.outputs.fuse_sha256 }}"
          APP_SHA="${{ needs.build.outputs.app_sha256 }}"
          test -n "$PURE_SHA" && test -n "$FUSE_SHA" && test -n "$APP_SHA"
          F=Formula/cc-pool.rb
          # Rewrite the release version embedded in both download urls (brew
          # infers the formula version from the /vX.Y.Z/ path segment).
          sed -i -E "/releases\/download/ s|v[0-9]+\.[0-9]+\.[0-9]+|v${VERSION}|g" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # pure|sha256 \"${PURE_SHA}\" # pure|" "$F"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # fuse|sha256 \"${FUSE_SHA}\" # fuse|" "$F"
          # The cask url interpolates #{version}, so only the version line and
          # the `# app` sha need rewriting.
          C=Casks/cc-pool-status.rb
          sed -i -E "s|version \"[0-9]+\.[0-9]+\.[0-9]+\"|version \"${VERSION}\"|" "$C"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\" # app|sha256 \"${APP_SHA}\" # app|" "$C"
          # Fail loud if a sed anchor stopped matching; allow idempotent re-runs.
          grep -q "releases/download/v${VERSION}/" "$F"
          grep -q "${PURE_SHA}\" # pure" "$F"
          grep -q "${FUSE_SHA}\" # fuse" "$F"
          grep -q "version \"${VERSION}\"" "$C"
          grep -q "${APP_SHA}\" # app" "$C"
          if git diff --quiet; then
            echo "formula and cask already at ${GITHUB_REF_NAME}; nothing to push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$F" "$C"
          git commit -m "Formula: bump to ${GITHUB_REF_NAME}"
          git push origin main
